name: Compile dbld-images

on:
  pull_request:
    paths:
      - 'dbld/**'
      - 'packaging/rhel/**'
      - 'packaging/debian/**'
      - '.github/workflows/dbld-images.yml'

  push:
    paths:
      - 'dbld/**'
      - 'packaging/rhel/**'
      - 'packaging/debian/**'
      - '.github/workflows/dbld-images.yml'

  schedule:
    - cron: '00 22 * * *'

  workflow_dispatch:
    inputs:
      testing_image_upload:
        description: Should we upload the images into GitHub Packages? (true/false)
        required: false
        default: "false"

jobs:
  build:
    runs-on: ${{ matrix.platform }}

    strategy:
      matrix:
        image:
          - almalinux-8
          - almalinux-9
          - centos-stream9
          - fedora-latest
          - fedora-rawhide
          - debian-bullseye
          - debian-bookworm
          - debian-sid
          - debian-testing
          - ubuntu-focal
          - ubuntu-jammy
          - ubuntu-noble
          - ubuntu-lunar
          - devshell
          - kira
          - tarball
        platform:
          - linux-arm64
          - ubuntu-latest
        exclude:
            - platform: linux-arm64
        include:
            - image: ubuntu-lunar
              platform: linux-arm64
      fail-fast: false

    steps:
      - name: Prepare
        run: |
          # TODO: remove this block once the arm64 runner is available for open-source and has docker pre-installed
          if [ "${{ matrix.platform }}" = "linux/arm64" ]; then
            sudo install -m 0755 -d /etc/apt/keyrings
            sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
            echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu \
            $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
            sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
            sudo apt-get update && sudo apt-get install -y acl docker-ce docker-ce-cli containerd.io docker-buildx-plugin
            USERID=$(id -u)
            sudo setfacl --modify user:${USERID}:rw /var/run/docker.sock
          fi

      - name: Checkout source code
        uses: actions/checkout@v4.1.7

      - name: Set container registry
        run: |
          CONTAINER_REGISTRY="ghcr.io/${{ github.repository_owner }}"
          CONTAINER_REGISTRY="$(echo "$CONTAINER_REGISTRY" | tr '[:upper:]' '[:lower:]')"

          . .github/workflows/gh-tools.sh
          gh_export CONTAINER_REGISTRY

      - name: Build the images
        run: dbld/rules image-${{ matrix.image }}

      - name: Should we upload the images?
        run: |
          if [ "${{ github.event.inputs.testing_image_upload }}" = "true" ] || \
             ( \
              [ "${{ github.repository_owner }}" = "syslog-ng" ] && \
              [ "${{ github.ref }}" = "refs/heads/master" ] && \
              [[ "${{ github.event_name }}" =~ ^(push|workflow_dispatch|schedule)$ ]] \
            )
          then
            UPLOAD_IMAGES_INTERNAL="true"
          else
            UPLOAD_IMAGES_INTERNAL="false"
          fi

          . .github/workflows/gh-tools.sh
          gh_export UPLOAD_IMAGES_INTERNAL

      - name: Log in to the Container registry
        if: env.UPLOAD_IMAGES_INTERNAL == 'true'
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push the images
        if: env.UPLOAD_IMAGES_INTERNAL == 'true'
        run: |
          dbld/rules push-image-${{ matrix.image }}
